    <text x="370"  y="820"  font-size="50"  opacity="0.09" transform="rotate(-10, 370, 820)">y</text>
    <text x="480"  y="910"  font-size="170" opacity="0.04" transform="rotate(3, 480, 910)">C</text>
    <text x="660"  y="780"  font-size="90"  opacity="0.06" transform="rotate(-7, 660, 780)">x</text>
