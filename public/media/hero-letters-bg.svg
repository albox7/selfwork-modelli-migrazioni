    <text x="560"  y="430"  font-size="75"  opacity="0.07" transform="rotate(9, 560, 430)">n</text>
    <text x="680"  y="580"  font-size="120" opacity="0.05" transform="rotate(-4, 680, 580)">V</text>
    <text x="830"  y="460"  font-size="50"  opacity="0.09" transform="rotate(7, 830, 460)">o</text>
